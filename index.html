<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            display: flex;
            justify-content: space-between;
        }
        .left-column {
            width: 65%;
            padding: 20px;
        }
        .right-column {
            width: 30%;
            background-color: #f4f4f4;
            padding: 20px;
        }
        h1, h2, h3 {
            color: #333;
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 22px;
            margin-bottom: 10px;
        }
        .section-content {
            font-size: 16px;
        }
        .button {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px 0;
            background-color: #22405c;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }
        .skills {
            list-style-type: none;
            padding: 0;
        }
        .skills li {
            display: inline-block;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="left-column">
        <div class="section">
            <h1>About Me</h1>
            <p>Write about yourself here. Mention your profession, achievements, and goals.</p>
        </div>

        <div class="section">
            <h2 class="section-title">Portfolio</h2>
            <div class="section-content">
                <p>You can showcase your projects here, either with links or images.</p>
            </div>
        </div>

        <div class="section">
            <a href="resume.pdf" class="button">Download Resume</a>
        </div>
    </div>

    <div class="right-column">
        <h2>Skills</h2>
        <ul class="skills">
            <li>3Ds Max</li>
            <li>Blender</li>
            <li>Photoshop</li>
        </ul>

        <h2>Contact</h2>
        <p>Phone: +995 574-521-373</p>
        <p>Email: example@gmail.com</p>
    </div>
</div>

</body>
</html>
